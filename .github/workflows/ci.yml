name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend and PostgreSQL
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: defi_copilot_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d defi_copilot_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@127.0.0.1:5432/defi_copilot_test
      APP_ENV: test
      PUBLIC_DEMO_MODE: "false"
      AUTH_ENABLED: "false"
      VAST_ENABLED: "false"
      VAST_DRY_RUN: "true"
      RUN_POSTGRES_INTEGRATION: "true"
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Compile Python modules
        run: python -m compileall app scripts

      - name: Apply PostgreSQL migrations
        run: alembic upgrade head

      - name: Run tests
        run: python -m pytest -q --tb=short 2>&1 | tee pytest-output.txt

      - name: Upload backend validation log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-validation-log
          path: backend/pytest-output.txt
          if-no-files-found: ignore

      - name: Validate public runtime preparation
        env:
          PUBLIC_DEMO_MODE: "true"
        run: python -m scripts.prepare_runtime 2>&1 | tee runtime-output.txt

      - name: Upload runtime preparation log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: runtime-preparation-log
          path: backend/runtime-output.txt
          if-no-files-found: ignore

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run lint 2>&1 | tee typecheck-output.txt

      - name: Validate BFF and MFA provider contracts
        run: npm run test:bff && npm run test:mfa

      - name: Upload frontend validation log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-validation-log
          path: frontend/typecheck-output.txt
          if-no-files-found: ignore

      - name: Build
        env:
          NEXT_PUBLIC_API_BASE_URL: https://defi-thesis-risk-copilot.onrender.com
          NEXT_PUBLIC_PUBLIC_DEMO_MODE: "true"
        run: npm run build

      - name: Install Chromium for browser E2E
        run: npx playwright install --with-deps chromium

      - name: Run browser E2E
        run: npm run test:e2e

      - name: Upload browser failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-browser-e2e-artifacts
          path: frontend/test-results/phase16-e2e
          if-no-files-found: ignore

      - name: Validate MFA route handlers
        run: npm run test:mfa:routes

  compose:
    name: Docker Compose Config
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate compose config
        run: docker compose config

      - name: Validate production compose config
        run: docker compose -f docker-compose.production.yml config
