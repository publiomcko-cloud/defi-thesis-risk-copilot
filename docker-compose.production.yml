services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    image: defi-thesis-risk-copilot-backend:latest
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    environment:
      APP_ENV: production
      DATABASE_URL: ${DATABASE_URL:-}
    ports:
      - "8000:8000"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    image: defi-thesis-risk-copilot-frontend:latest
    command: sh -c "npm run build && npm run start -- --hostname 0.0.0.0"
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-}
    ports:
      - "3000:3000"
