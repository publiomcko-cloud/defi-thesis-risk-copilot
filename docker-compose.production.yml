services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    image: defi-thesis-risk-copilot-backend:latest
    command: sh -c "alembic upgrade head && python -m scripts.prepare_runtime && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    environment:
      APP_ENV: production
      PUBLIC_DEMO_MODE: ${PUBLIC_DEMO_MODE:-true}
      DATABASE_URL: ${DATABASE_URL:-sqlite:///./defi_copilot.production.db}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://127.0.0.1:3000}
      AUTH_ENABLED: ${AUTH_ENABLED:-false}
      AUTH_PROVIDER: ${AUTH_PROVIDER:-supabase}
      SUPABASE_URL: ${SUPABASE_URL:-}
      SUPABASE_JWKS_URL: ${SUPABASE_JWKS_URL:-}
      SUPABASE_JWT_ISSUER: ${SUPABASE_JWT_ISSUER:-}
      SUPABASE_JWT_AUDIENCE: ${SUPABASE_JWT_AUDIENCE:-authenticated}
      ADMIN_MFA_REQUIRED: ${ADMIN_MFA_REQUIRED:-false}
      BFF_AUDIT_SECRET: ${BFF_AUDIT_SECRET:-}
      LLM_SYNTHESIS_ENABLED: ${PUBLIC_DEMO_LLM_SYNTHESIS_ENABLED:-false}
      LLM_PROVIDER: ${PUBLIC_DEMO_LLM_PROVIDER:-disabled}
      RAG_SEMANTIC_ENABLED: ${RAG_SEMANTIC_ENABLED:-false}
      VAST_ENABLED: ${VAST_ENABLED:-false}
      VAST_DRY_RUN: ${VAST_DRY_RUN:-true}
      VAST_JOB_ENABLED: ${VAST_JOB_ENABLED:-false}
      JOBS_ENABLED: ${JOBS_ENABLED:-false}
      WORKER_API_ENABLED: ${WORKER_API_ENABLED:-false}
    ports:
      - "8000:8000"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    image: defi-thesis-risk-copilot-frontend:latest
    command: sh -c "npm run build && npm run start -- --hostname 0.0.0.0"
    environment:
      BACKEND_API_BASE_URL: ${BACKEND_API_BASE_URL:-http://backend:8000}
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://127.0.0.1:8000}
      NEXT_PUBLIC_PUBLIC_DEMO_MODE: ${NEXT_PUBLIC_PUBLIC_DEMO_MODE:-true}
      SUPABASE_URL: ${SUPABASE_URL:-}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY:-}
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL:-}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY:-}
      BFF_AUDIT_SECRET: ${BFF_AUDIT_SECRET:-}
    ports:
      - "3000:3000"
