services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    env_file:
      - .env.example
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/defi_copilot
    volumes:
      - ./backend:/workspace/backend
      - ./knowledge_base:/workspace/knowledge_base:ro
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    working_dir: /app
    command: npm run dev -- --hostname 0.0.0.0
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://127.0.0.1:8000
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
      - frontend_next:/app/.next
    ports:
      - "3000:3000"
    depends_on:
      - backend

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: defi_copilot
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d defi_copilot"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  frontend_node_modules:
  frontend_next:
