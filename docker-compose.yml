services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    command: sh -c "alembic upgrade head && python -m scripts.prepare_runtime && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    env_file:
      - .env.example
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/defi_copilot
      PUBLIC_DEMO_MODE: ${PUBLIC_DEMO_MODE:-false}
      AUTH_ENABLED: ${AUTH_ENABLED:-false}
      AUTH_PROVIDER: ${AUTH_PROVIDER:-legacy_local}
      SUPABASE_URL: ${SUPABASE_URL:-}
      SUPABASE_JWKS_URL: ${SUPABASE_JWKS_URL:-}
      SUPABASE_JWT_ISSUER: ${SUPABASE_JWT_ISSUER:-}
      SUPABASE_JWT_AUDIENCE: ${SUPABASE_JWT_AUDIENCE:-authenticated}
      ADMIN_MFA_REQUIRED: ${ADMIN_MFA_REQUIRED:-false}
      BFF_AUDIT_SECRET: ${BFF_AUDIT_SECRET:-}
      LLM_SYNTHESIS_ENABLED: ${LLM_SYNTHESIS_ENABLED:-false}
      LLM_PROVIDER: ${LLM_PROVIDER:-disabled}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://localhost:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.1}
      OPENAI_COMPATIBLE_BASE_URL: ${OPENAI_COMPATIBLE_BASE_URL:-}
      OPENAI_COMPATIBLE_API_KEY: ${OPENAI_COMPATIBLE_API_KEY:-}
      OPENAI_COMPATIBLE_MODEL: ${OPENAI_COMPATIBLE_MODEL:-gpt-4o-mini}
      LLM_TIMEOUT_SECONDS: ${LLM_TIMEOUT_SECONDS:-8}
      VAST_ENABLED: ${VAST_ENABLED:-false}
      VAST_DRY_RUN: ${VAST_DRY_RUN:-true}
      VAST_JOB_ENABLED: ${VAST_JOB_ENABLED:-false}
      JOBS_ENABLED: ${JOBS_ENABLED:-false}
      WORKER_API_ENABLED: ${WORKER_API_ENABLED:-false}
      RAG_SEMANTIC_ENABLED: ${RAG_SEMANTIC_ENABLED:-false}
      RAG_EMBEDDING_PROVIDER: ${RAG_EMBEDDING_PROVIDER:-local_semantic}
      RAG_HYBRID_KEYWORD_WEIGHT: ${RAG_HYBRID_KEYWORD_WEIGHT:-0.45}
      RAG_HYBRID_VECTOR_WEIGHT: ${RAG_HYBRID_VECTOR_WEIGHT:-0.45}
      RAG_HYBRID_METADATA_WEIGHT: ${RAG_HYBRID_METADATA_WEIGHT:-0.10}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./backend:/workspace/backend
      - ./knowledge_base:/workspace/knowledge_base:ro
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    working_dir: /app
    command: npm run dev -- --hostname 0.0.0.0
    environment:
      BACKEND_API_BASE_URL: http://backend:8000
      NEXT_PUBLIC_API_BASE_URL: http://127.0.0.1:8000
      NEXT_PUBLIC_PUBLIC_DEMO_MODE: ${NEXT_PUBLIC_PUBLIC_DEMO_MODE:-false}
      SUPABASE_URL: ${SUPABASE_URL:-}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY:-}
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL:-}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY:-}
      BFF_AUDIT_SECRET: ${BFF_AUDIT_SECRET:-}
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
      - frontend_next:/app/.next
    ports:
      - "3000:3000"
    depends_on:
      - backend

  worker:
    profiles: ["worker"]
    build:
      context: .
      dockerfile: Dockerfile.backend
    command: python -m app.jobs.worker_runner
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/defi_copilot
      WORKER_CONTROL_PLANE_URL: http://backend:8000
      WORKER_CREDENTIAL: ${WORKER_CREDENTIAL:-}
      WORKER_PROTOCOL_VERSION: ${WORKER_PROTOCOL_VERSION:-v1}
      WORKER_POLL_SECONDS: ${WORKER_POLL_SECONDS:-2}
      LLM_SYNTHESIS_ENABLED: ${LLM_SYNTHESIS_ENABLED:-false}
      LLM_PROVIDER: ${LLM_PROVIDER:-disabled}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.1}
      RAG_SEMANTIC_ENABLED: ${RAG_SEMANTIC_ENABLED:-false}
      RAG_EMBEDDING_PROVIDER: ${RAG_EMBEDDING_PROVIDER:-local_semantic}
      VAST_ENABLED: ${VAST_ENABLED:-false}
      VAST_DRY_RUN: ${VAST_DRY_RUN:-true}
      VAST_JOB_ENABLED: ${VAST_JOB_ENABLED:-false}
      VAST_API_BASE_URL: ${VAST_API_BASE_URL:-https://console.vast.ai/api/v0}
      VAST_API_KEY: ${VAST_API_KEY:-}
      VAST_CREDENTIAL_NAME: ${VAST_CREDENTIAL_NAME:-vast_ai_default}
      CREDENTIAL_ENCRYPTION_KEY: ${CREDENTIAL_ENCRYPTION_KEY:-}
      VAST_MAX_HOURLY_COST_USD: ${VAST_MAX_HOURLY_COST_USD:-0.50}
      VAST_MAX_SESSION_MINUTES: ${VAST_MAX_SESSION_MINUTES:-30}
      VAST_MAX_ACTIVE_INSTANCES: ${VAST_MAX_ACTIVE_INSTANCES:-1}
      VAST_GPU_ALLOWLIST: ${VAST_GPU_ALLOWLIST:-RTX_4090,RTX_3090,A5000,A6000}
      VAST_MIN_GPU_RAM_GB: ${VAST_MIN_GPU_RAM_GB:-16}
      VAST_DISK_GB: ${VAST_DISK_GB:-40}
      VAST_REQUIRE_VERIFIED: ${VAST_REQUIRE_VERIFIED:-true}
      VAST_AUTO_DESTROY: ${VAST_AUTO_DESTROY:-true}
      VAST_IDLE_TIMEOUT_SECONDS: ${VAST_IDLE_TIMEOUT_SECONDS:-300}
      VAST_IMAGE: ${VAST_IMAGE:-}
      VAST_MODEL: ${VAST_MODEL:-}
      VAST_CONTAINER_PORT: ${VAST_CONTAINER_PORT:-8000}
      VAST_STARTUP_TIMEOUT_SECONDS: ${VAST_STARTUP_TIMEOUT_SECONDS:-600}
      VAST_POLL_INTERVAL_SECONDS: ${VAST_POLL_INTERVAL_SECONDS:-10}
    depends_on:
      backend:
        condition: service_started
    volumes:
      - ./backend:/workspace/backend:ro
      - ./knowledge_base:/workspace/knowledge_base:ro
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: defi_copilot
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d defi_copilot"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  frontend_node_modules:
  frontend_next:
